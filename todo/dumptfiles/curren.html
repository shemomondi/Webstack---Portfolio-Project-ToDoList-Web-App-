<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current_Todos</title>
</head>
<body>
    <style>
            *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;

        list-style: none;
        text-decoration: none;
    
    }
    .container{
        background: linear-gradient(rgb(57, 57, 172), rgb(50, 143, 50), rgb(50, 143, 50));
    
    }
    body{
        /* border: 1px solid rgb(190, 8, 136);   */
        height: 100%;
        background: linear-gradient(rgb(61, 172, 57), rgb(32, 61, 194),rgb(172, 31, 113));
    }
    .navbar{
        /* border: 1px solid red; */
        justify-content: space-between;
        display: flex;
        text-align: center;
        align-items: center;
    }
    ul  {
        display: flex;
        justify-content: space-between;
        /* border: 1px solid rgb(14, 92, 180);  */
    }
    li{
    
        padding: 14px 14px;
        margin: 10px 8px 15px 15px;
        font-size: 18px; 
    }
    li a{
        color: white;
        
    }
    li a:hover{
        color: blue;
    }
    .left{
        display: flex;
        padding: 14px 14px;
        margin: 10px 80px;
        font-size: 20px;

    }
    .s1{
        color: blue;
    }
    .s2{
    color: red;
    }
    .s3{
    color: gold;
    }
    .s4{
    color: rgb(143, 7, 14);
    }
    .s5{
    color: purple;
    }
    .s6{
    color: rgb(180, 12, 12);
    }
    .s7{
    color: aqua;
    }

    .body{
        justify-content: center;
        align-items: center;
        text-align: center;
        margin: 20px 20px;
        padding-top: 100px;
    }
    .btn{
        padding: 15px 15px;
        margin: 15px 15px;
        border: none;
        border-radius: 5px;
        background: linear-gradient(rgb(148, 28, 148), rgb(202, 202, 23),rgb(180, 32, 32),rgb(185, 165, 52),rgb(50, 153, 50));
    }
    .btn a {
        color: black;
        font-size: 18px;

    }
    table{
        border: 1px solid  #ddd;
        width: 80%;
        height:  100%;
        margin: auto;
        box-shadow: 1px  1px 1px grey;
    }
    </style>
    <div class="container">
        {% csrf_token %}
        <nav class="navbar">
           <div class="left">
            <img src="#" alt="" class="logo">
            <h3><span class="s1">To</span>
                <span class="s2">~</span>
                <span class="s3">Do</span>
                <span class="s4">~</span>
                <span class="s5">List</span>
                <span class="s6">~</span>
                <span class="s7">App</span>
            </h3>
           </div>
            <ul>
               <li><a href="{%url 'register'%}">logout</a></li>
            </ul>
        </nav>
    </div>

    <div class="body">
        <h1>Current Todo List</h1>
        <table class="table mb-4">
            <thead>
                <tr>
                    <th scope="col">Todo item</th>
                    <th scope="col">Description</th>
                    <th scope="col">Status</th>
                    <th scope="col">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for i in todos %}
                <tr>
                    <td style="border: 1px solid #ddd; background-color: black;color: #ddd;">{{ i.task }}</td>
                    <td style="border: 1px solid #ddd;"> <textarea name="" id="" cols="30" rows="5">{{ i.description }}</textarea> </td>
                    {% if i.status %}
                    <td style="border: 1px solid #ddd;">Completed</td>
                    {% else %}
                    <td style="border: 1px solid #ddd;">In progress</td>
                    {% endif %}
                    <td style="border: 1px solid #ddd;">
                        <a href="{% url 'delete_item' i.id %}">Delete</a>
                        <td>
                        {% if not i.status %}
                      
                        <a href="{% url 'update_status' i.id %}">Mark as Completed</a>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button> <a href="{% url 'create' %}">Add More</a></button>
        
    
    </div>
</body>
</html>
