<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<style>
    * { box-sizing: border-box;
    }
    .navbar{
        /* border: 1px solid red; */
        justify-content: space-between;
        display: flex;
        text-align: center;
        align-items: center;
    }
    .left{
        display: flex;
        padding: 14px 14px;
        margin: 10px 80px;
        font-size: 20px;
    }
    ul  {
        display: flex;
        justify-content: space-between;
        /* border: 1px solid rgb(14, 92, 180);  */
    }
    li{
    
        padding: 14px 14px;
        margin: 10px 8px 15px 15px;
        font-size: 18px; 
       list-style: none;
      
    }
    li a{
      color: #533ac2;
        text-decoration: none;
        list-style: none;
        
    }
    li a:hover{
        color: blue;
    }
    
    body { font-family: Arial, sans-serif; 
    margin:  0; 
    padding: 20px;
    background: linear-gradient(rgb(150, 150, 51),rgb(62, 173, 62),rgb(185, 71, 90),rgb(38, 38, 167),rgb(146, 130, 36));
    height: 100%;
    opacity: 0.9;
}

    
      h2 { color: #3a6793;
      text-align: center;
      }
      table {
          border-collapse: collapse;
          width: 50%;
          margin: 20px auto;
      }
      button {
          border-collapse: collapse;
          width: 50%;
          margin: 20px 100px;
      }
      th, td {
          border: 1px solid black;
          padding: 8px;
          text-align: left;
      }
      th {
          background-color: #533ac2;
          color: white;
      }
      td {
          background-color: #554f4f83;
      }
      select, input {
          width:  100%;
          height: 30px;
          border-radius: 5px;
      }
      .main{
          border: 1px  solid rgb(226, 71, 71);
          display: flex;
          justify-content: space-around;
          align-items: center;
          flex-direction: column;
          padding: 20px;
          background-color: #6a8eb3;
          max-width:  600px;
          margin: 20px auto;
          background-repeat: no-repeat;
          background-size: cover;
          border: none;
          border-radius: 30px;
          opacity: 0.9;

      }
      .s1{
          color: blue;
      }
      .s2{
      color: red;
      }
      .s3{
      color: gold;
      }
      .s4{
      color: rgb(143, 7, 14);
      }
      .s5{
      color: purple;
      }
      .s6{
      color: rgb(180, 12, 12);
      }
      .s7{
      color: aqua;
      }  
</style>
</head>
<body>
    <div class="container">
       
        <nav class="navbar">
           <div class="left">
            <img src="#" alt="" class="logo">
            <h3><span class="s1">To</span>
                <span class="s2">~</span>
                <span class="s3">Do</span>
                <span class="s4">~</span>
                <span class="s5">List</span>
                <span class="s6">~</span>
                <span class="s7">App</span>
            </h3>
           </div>
            <ul>
               <li> <a href="{%url 'register'%}">Logout</a></li>
            </ul>
        </nav>
    </div>
<div class="main">
<h2>Todo List</h2>
<form action="" method="POST">
    {% csrf_token %}
<table>
    <!-- row-1 -->
  <tr>
    <th> Title:</th>
    <td><input type="text" name="task" value=""></td>
  </tr>
    <!-- row-2 -->
  <tr>
    <th>Description:</th>
    <td><textarea rows="4" cols="30" name="memo"></textarea></td>
  </tr>
    <!-- row-3 -->
  <tr>
    <th>Due date:</th>
    <td><input type="datetime-local" value="" name="da"></td>
  </tr>
</table> 
<button class="submit" type="submit" >Add Todo Item</button><br>
<button><a href="{%url 'current'%}">View At The Current Added Tasks</a></button>
<br>
</div>
</form>
</body>
</html>
